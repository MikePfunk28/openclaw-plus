# LocalStack - Local AWS Cloud Development Environment
# Run with: docker-compose up -d

version: "3.8"

services:
  localstack:
    container_name: openclaw-localstack
    image: localstack/localstack:latest
    ports:
      - "4566:4566"            # LocalStack Gateway
      - "4510-4559:4510-4559"  # External services port range
    environment:
      - SERVICES=s3,lambda,apigateway,dynamodb,sqs,sns,cloudwatch,cloudwatchlogs,ec2,ecs,ecr,iam,kms,secretsmanager,stepfunctions,sts,cloudformation,route53,elbv2,logs
      - DEBUG=${DEBUG:-0}
      - DATA_DIR=/var/lib/localstack/data
      - LAMBDA_EXECUTOR=local
      - LAMBDA_RUNTIME_EXECUTOR=docker
      - LAMBDA_DOCKER_NETWORK=host
      - DOCKER_HOST=unix:///var/run/docker.sock
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - PERSISTENCE=${PERSISTENCE:-1}
    volumes:
      - "${LOCALSTACK_VOLUME_DIR:-./data/localstack}:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - openclaw-network

  # LocalStack init container to create resources
  localstack-init:
    container_name: openclaw-localstack-init
    image: localstack/localstack:latest
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      - AWS_ENDPOINT_URL=http://localstack:4566
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
    entrypoint: >
      bash -c "
        echo 'Waiting for LocalStack to be ready...'
        until curl -s http://localstack:4566/health | grep -q 'running'; do sleep 2; done
        echo 'LocalStack is ready, initializing resources...'
        
        # Create S3 buckets
        aws --endpoint-url=http://localstack:4566 s3 mb s3://openclaw-data-dev || true
        aws --endpoint-url=http://localstack:4566 s3 mb s3://openclaw-models-dev || true
        
        # Create DynamoDB tables
        aws --endpoint-url=http://localstack:4566 dynamodb create-table \
          --table-name openclaw-sessions \
          --attribute-definitions AttributeName=session_id,AttributeType=S AttributeName=created_at,AttributeType=N \
          --key-schema AttributeName=session_id,KeyType=HASH AttributeName=created_at,KeyType=RANGE \
          --billing-mode PAY_PER_REQUEST || true
          
        aws --endpoint-url=http://localstack:4566 dynamodb create-table \
          --table-name openclaw-conversations \
          --attribute-definitions AttributeName=conversation_id,AttributeType=S AttributeName=message_id,AttributeType=S \
          --key-schema AttributeName=conversation_id,KeyType=HASH AttributeName=message_id,KeyType=RANGE \
          --billing-mode PAY_PER_REQUEST || true
          
        # Create SQS queues
        aws --endpoint-url=http://localstack:4566 sqs create-queue --queue-name openclaw-tasks || true
        aws --endpoint-url=http://localstack:4566 sqs create-queue --queue-name openclaw-events || true
        
        # Create SNS topics
        aws --endpoint-url=http://localstack:4566 sns create-topic --name openclaw-notifications || true
        
        # Create Secrets
        aws --endpoint-url=http://localstack:4566 secretsmanager create-secret \
          --name openclaw-api-keys \
          --secret-string '{\"anthropic\":\"test-key\",\"openai\":\"test-key\"}' || true
          
        echo 'LocalStack initialization complete!'
      "
    networks:
      - openclaw-network

  # DynamoDB Admin UI (optional)
  dynamodb-admin:
    container_name: openclaw-dynamodb-admin
    image: aaronshaf/dynamodb-admin:latest
    ports:
      - "8001:8001"
    environment:
      - DYNAMO_ENDPOINT=http://localstack:4566
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    depends_on:
      - localstack
    networks:
      - openclaw-network

  # LocalStack Web UI (optional)
  localstack-ui:
    container_name: openclaw-localstack-ui
    image: localstack/localstack-ui:latest
    ports:
      - "8080:8080"
    environment:
      - LOCALSTACK_ENDPOINT=http://localstack:4566
    depends_on:
      - localstack
    networks:
      - openclaw-network

networks:
  openclaw-network:
    driver: bridge

volumes:
  localstack-data:
