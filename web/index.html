<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenClaw Plus</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-glow"></div>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="badge"></div>
          <div>
            <h1>OpenClaw Plus</h1>
            <p>Model-agnostic open agent</p>
          </div>
        </div>

        <section>
          <h2>Access Token</h2>
          <input id="tokenInput" type="password" placeholder="Bearer token (optional)" />
        </section>

        <section>
          <div class="heading-row">
            <h2>Realtime</h2>
            <button id="reconnectBtn" type="button">Reconnect</button>
          </div>
          <div id="connectionStatus" class="connection-status offline">offline</div>
        </section>

        <section>
          <h2>Model</h2>
          <select id="modelSelect"></select>
        </section>

        <section>
          <div class="heading-row">
            <h2>Sessions</h2>
            <button id="newSessionBtn" type="button">New</button>
          </div>
          <div id="sessionList" class="session-list"></div>
        </section>

        <section>
          <h2>Run Settings</h2>
          <label class="setting">Transport
            <select id="transportModeSelect">
              <option value="auto">auto (prefer websocket)</option>
              <option value="ws">websocket only</option>
              <option value="http">http stream only</option>
            </select>
          </label>
          <label class="setting">Max steps<input id="maxStepsInput" type="number" min="1" max="50" value="8" /></label>
          <label class="setting">Max cycles<input id="maxCyclesInput" type="number" min="1" max="20" value="4" /></label>
          <label class="setting">Autonomy
            <select id="autonomyModeSelect">
              <option value="continuous">continuous</option>
              <option value="single-cycle">single-cycle</option>
            </select>
          </label>
          <label class="setting">Approvals
            <select id="approvalModeSelect">
              <option value="never">never (auto-run)</option>
              <option value="manual">manual (block)</option>
            </select>
          </label>
        </section>

        <section>
          <div class="heading-row">
            <h2>Skills</h2>
            <button id="refreshBtn" type="button">Refresh</button>
          </div>
          <div id="skillList" class="skill-list"></div>
        </section>
      </aside>

      <main class="main-panel">
        <div id="chat" class="chat"></div>
        <div class="composer-wrap">
          <textarea
            id="promptInput"
            placeholder="Ask for a plan, a code change, or a multi-step task..."
            rows="3"
          ></textarea>
          <button id="sendBtn" type="button">Run Agent</button>
        </div>
      </main>

      <aside class="trace-panel">
        <h2>Execution Trace</h2>
        <div id="traceList" class="trace-list"></div>
      </aside>
    </div>

    <template id="messageTemplate">
      <article class="message">
        <div class="meta"></div>
        <div class="content"></div>
      </article>
    </template>

    <script type="module" src="/app.js"></script>
  </body>
</html>
